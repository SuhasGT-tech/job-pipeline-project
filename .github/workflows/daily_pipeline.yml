name: Daily job pipeline

on:
  schedule:
    - cron: "30 3 * * *"  # 09:00 IST daily
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
      SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
      SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
      SUPABASE_DBNAME: ${{ secrets.SUPABASE_DBNAME }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
      QA_DIGEST_TO_EMAIL: ${{ secrets.QA_DIGEST_TO_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        working-directory: ingestion
        run: python fetch_jobs.py

      - name: Run dbt
        working-directory: dbt_project
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml.example ~/.dbt/profiles.yml
          echo "--- DEBUG: profiles.yml contents ---"
          cat ~/.dbt/profiles.yml
          echo "--- DEBUG: dbt debug output ---"
          dbt debug
          echo "--- Running dbt run ---"
          dbt run
          dbt test
      - name: Send email digest
        working-directory: ingestion
        run: python send_digest.py

